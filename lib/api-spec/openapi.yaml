openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DzVêtements Fashion Marketplace API for Algeria
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product listings
  - name: categories
    description: Product categories
  - name: sellers
    description: Seller profiles
  - name: cart
    description: Shopping cart
  - name: orders
    description: Orders management
  - name: reviews
    description: Product reviews
  - name: wilayas
    description: Algerian wilayas/cities

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: subcategory
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: wilaya
          in: query
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: string
        - name: color
          in: query
          schema:
            type: string
        - name: condition
          in: query
          schema:
            type: string
            enum: [new, like_new, good, fair]
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, popular]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /sellers:
    get:
      operationId: listSellers
      tags: [sellers]
      summary: List featured sellers
      responses:
        "200":
          description: List of sellers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Seller"

  /sellers/{id}:
    get:
      operationId: getSeller
      tags: [sellers]
      summary: Get seller profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seller profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sellers/{id}/products:
    get:
      operationId: getSellerProducts
      tags: [sellers]
      summary: Get products by seller
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Seller products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/{itemId}:
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: Get reviews for a product
      parameters:
        - name: productId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /wilayas:
    get:
      operationId: listWilayas
      tags: [wilayas]
      summary: List Algerian wilayas
      responses:
        "200":
          description: List of wilayas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wilaya"

  /stats:
    get:
      operationId: getStats
      tags: [products]
      summary: Get marketplace stats
      responses:
        "200":
          description: Marketplace statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    Product:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
          nullable: true
        currency:
          type: string
          default: DZD
        images:
          type: array
          items:
            type: string
        category:
          type: string
        subcategory:
          type: string
          nullable: true
        sizes:
          type: array
          items:
            type: string
        colors:
          type: array
          items:
            type: string
        condition:
          type: string
          enum: [new, like_new, good, fair]
        brand:
          type: string
          nullable: true
        sellerId:
          type: integer
        sellerName:
          type: string
        sellerAvatar:
          type: string
          nullable: true
        wilaya:
          type: string
        city:
          type: string
        rating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        viewCount:
          type: integer
        isFeatured:
          type: boolean
        isNew:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - price
        - currency
        - images
        - category
        - sizes
        - colors
        - condition
        - sellerId
        - sellerName
        - wilaya
        - city
        - reviewCount
        - viewCount
        - isFeatured
        - isNew
        - createdAt

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            seller:
              $ref: "#/components/schemas/Seller"
            relatedProducts:
              type: array
              items:
                $ref: "#/components/schemas/Product"
            reviews:
              type: array
              items:
                $ref: "#/components/schemas/Review"

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - products
        - total
        - page
        - totalPages

    CreateProductInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
          nullable: true
        images:
          type: array
          items:
            type: string
        category:
          type: string
        subcategory:
          type: string
          nullable: true
        sizes:
          type: array
          items:
            type: string
        colors:
          type: array
          items:
            type: string
        condition:
          type: string
          enum: [new, like_new, good, fair]
        brand:
          type: string
          nullable: true
        sellerId:
          type: integer
        wilaya:
          type: string
        city:
          type: string
      required:
        - title
        - description
        - price
        - images
        - category
        - sizes
        - colors
        - condition
        - sellerId
        - wilaya
        - city

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nameAr:
          type: string
        icon:
          type: string
        productCount:
          type: integer
        subcategories:
          type: array
          items:
            $ref: "#/components/schemas/Subcategory"
      required:
        - id
        - name
        - nameAr
        - icon
        - productCount

    Subcategory:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        productCount:
          type: integer
      required:
        - id
        - name
        - productCount

    Seller:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        avatar:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        wilaya:
          type: string
        city:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        productCount:
          type: integer
        isVerified:
          type: boolean
        joinedDate:
          type: string
        responseRate:
          type: number
      required:
        - id
        - name
        - wilaya
        - city
        - rating
        - reviewCount
        - productCount
        - isVerified
        - joinedDate
        - responseRate

    SellerDetail:
      allOf:
        - $ref: "#/components/schemas/Seller"
        - type: object
          properties:
            products:
              type: array
              items:
                $ref: "#/components/schemas/Product"
            reviews:
              type: array
              items:
                $ref: "#/components/schemas/Review"

    Cart:
      type: object
      properties:
        sessionId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: integer
      required:
        - sessionId
        - items
        - total
        - itemCount

    CartItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        quantity:
          type: integer
        selectedSize:
          type: string
          nullable: true
        selectedColor:
          type: string
          nullable: true
      required:
        - id
        - productId
        - product
        - quantity

    AddToCartInput:
      type: object
      properties:
        sessionId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer
          default: 1
        selectedSize:
          type: string
          nullable: true
        selectedColor:
          type: string
          nullable: true
      required:
        - sessionId
        - productId
        - quantity

    Order:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        customerName:
          type: string
        customerPhone:
          type: string
        deliveryWilaya:
          type: string
        deliveryAddress:
          type: string
        deliveryFee:
          type: number
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - items
        - total
        - status
        - customerName
        - customerPhone
        - deliveryWilaya
        - deliveryAddress
        - deliveryFee
        - createdAt

    CreateOrderInput:
      type: object
      properties:
        sessionId:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        deliveryWilaya:
          type: string
        deliveryAddress:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - sessionId
        - customerName
        - customerPhone
        - deliveryWilaya
        - deliveryAddress

    Review:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        reviewerName:
          type: string
        reviewerAvatar:
          type: string
          nullable: true
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
      required:
        - id
        - productId
        - reviewerName
        - rating
        - comment
        - createdAt

    CreateReviewInput:
      type: object
      properties:
        productId:
          type: integer
        reviewerName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required:
        - productId
        - reviewerName
        - rating
        - comment

    Wilaya:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        nameAr:
          type: string
        region:
          type: string
        deliveryFee:
          type: number
      required:
        - code
        - name
        - nameAr
        - region
        - deliveryFee

    MarketplaceStats:
      type: object
      properties:
        totalProducts:
          type: integer
        totalSellers:
          type: integer
        totalCategories:
          type: integer
        totalWilayas:
          type: integer
      required:
        - totalProducts
        - totalSellers
        - totalCategories
        - totalWilayas
